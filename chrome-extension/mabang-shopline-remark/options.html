<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Mabang Shopline Remark 设置</title>
    <style>
      body {
        width: 560px;
        margin: 24px;
        color: #202124;
        font: 14px/1.5 sans-serif;
      }
      label {
        display: block;
        margin: 14px 0 6px;
        font-weight: 600;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid #c9cdd4;
        border-radius: 6px;
      }
      button {
        margin-top: 18px;
        padding: 8px 14px;
        border: 0;
        border-radius: 6px;
        background: #1f6feb;
        color: white;
        cursor: pointer;
      }
      .hint {
        margin-top: 6px;
        color: #5f6368;
      }
      .status {
        margin-left: 10px;
        color: #188038;
      }
    </style>
  </head>
  <body>
    <h2>Mabang Shopline Remark 设置</h2>
    <label for="apiUrl">后端接口地址</label>
    <input id="apiUrl" placeholder="http://127.0.0.1:3000/api/order-remarks/shopline" />
    <div class="hint">填写你的服务地址，例如 https://your-domain.com/api/order-remarks/shopline</div>

    <label for="token">访问 Token（可选）</label>
    <input id="token" placeholder="如果后端配置 ORDER_REMARK_LOOKUP_TOKEN，则这里填写同一个值" />

    <button id="save">保存</button>
    <span id="status" class="status"></span>
    <script src="options.js"></script>
  </body>
</html>
